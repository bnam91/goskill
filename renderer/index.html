<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>goskill</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div class="title">📦 goskill <span id="app-version" class="app-version" title="현재 설치된 버전">로딩 중…</span></div>
    <div class="actions">
      <button id="refresh" title="새로고침">⟲ 새로고침</button>
    </div>
  </header>

  <section class="stage-panel" id="stage-panel">
    <div class="stage-col">
      <div class="stage-head">
        <span class="stage-title">📥 원격 작업 대기 <span class="stage-count" id="sc-remote">(0)</span></span>
        <div class="stage-actions">
          <button id="btn-clear-remote" class="stage-btn-ghost">비우기</button>
          <button id="btn-exec-delete" class="stage-btn-danger">🗑 삭제</button>
          <button id="btn-setup-prompt" class="stage-btn-ghost" title="다운받은 스킬의 heyclaude.md를 따라 환경 세팅하라는 프롬프트를 클립보드에 복사합니다.">🚀 환경 세팅 프롬프트</button>
          <button id="btn-exec-download" class="stage-btn-primary">📥 다운받기</button>
        </div>
      </div>
      <div class="stage-items" id="stage-items-remote"></div>
    </div>
    <div class="stage-col">
      <div class="stage-head">
        <span class="stage-title">📤 업로드 대기 <span class="stage-count" id="sc-local">(0)</span></span>
        <div class="stage-actions">
          <button id="btn-clear-local" class="stage-btn-ghost">비우기</button>
          <button id="btn-heyclaude-prompt" class="stage-btn-ghost" title="goskill-heyclaude 메타 스킬로 가공본 생성 (필수 사전 단계). 클릭 시 프롬프트가 클립보드에 복사됩니다.">🔧 직원용 전처리</button>
          <button id="btn-exec-upload" class="stage-btn-primary">📤 업로드 실행</button>
        </div>
      </div>
      <div class="stage-items" id="stage-items-local"></div>
    </div>
  </section>

  <main class="panes">
    <section class="pane" id="pane-remote">
      <header class="pane-header">
        <div class="pane-title">REMOTE <span class="pane-sub">공용 레포</span></div>
        <div class="pane-path" id="path-remote">—</div>
        <div class="pane-count" id="count-remote">—</div>
        <input type="search" class="pane-search" id="search-remote" placeholder="🔍 이름 검색…">
        <select class="pane-filter" id="filter-remote" title="카테고리 필터">
          <option value="all">전체</option>
          <option value="shared">★ 공유중</option>
          <!-- 태그별 옵션은 renderer.js가 동적으로 채움 -->
          <option value="notag">📦 원격 · 분류 없음</option>
        </select>
      </header>
      <ul class="skill-list" id="list-remote"></ul>
    </section>

    <section class="pane" id="pane-local">
      <header class="pane-header">
        <div class="pane-title">LOCAL <span class="pane-sub">내 스킬</span></div>
        <div class="pane-path" id="path-local">—</div>
        <div class="pane-count" id="count-local">—</div>
        <input type="search" class="pane-search" id="search-local" placeholder="🔍 이름 검색…">
        <select class="pane-filter" id="filter-local" title="카테고리 필터">
          <option value="all">전체</option>
          <option value="shared">★ 공유중 (모두)</option>
          <!-- 태그별 ★ 공유중 옵션은 renderer.js가 동적으로 채움 -->
          <option value="shared_notag">★ 공유중 · 분류 없음</option>
          <option value="personal">🔒 개인</option>
        </select>
      </header>
      <ul class="skill-list" id="list-local"></ul>
    </section>
  </main>

  <aside class="detail" id="detail">
    <div class="detail-placeholder">스킬을 클릭하면 상세가 표시됩니다.</div>
  </aside>

  <footer class="statusbar">
    <span id="status-text">준비</span>
  </footer>

  <script src="renderer.js"></script>
</body>
</html>
